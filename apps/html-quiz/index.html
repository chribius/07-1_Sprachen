<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
  <!-- Relativer base href: funktioniert lokal und wenn die App in docs/html-quiz/ liegt -->
  <base href="./">
    <title>HTML Quiz - 7. Klasse</title>
    <style>body{font-family:system-ui;padding:1rem} .card{background:#fff;padding:1rem;border-radius:6px;max-width:600px;margin:0 auto}</style>
  </head>
  <body>
    <div class="card">
      <h1>Kurzes Quiz</h1>
      <div id="question"></div>
      <div id="controls"></div>
      <div id="result" style="margin-top:.8rem;font-weight:600"></div>
    </div>
    <script>
      const questions = [
        {q:'Welches Element für einen Absatz?',opts:['<div>','<p>','<span>'],a:1},
        {q:'Wie schreibt man ein Link-Tag?',opts:['<a href="...">','<link>','<href>'],a:0}
      ]
      let idx=0
      const qEl=document.getElementById('question'), cEl=document.getElementById('controls'), rEl=document.getElementById('result')
      function show(){
        rEl.textContent=''
        qEl.innerHTML=`<h2>Frage ${idx+1}</h2><p>${questions[idx].q}</p>`
        cEl.innerHTML = questions[idx].opts.map((o,i)=>`<button data-i="${i}">${o}</button>`).join(' ')
        cEl.querySelectorAll('button').forEach(b=>b.addEventListener('click',e=>{
          const sel=Number(e.target.dataset.i)
          if(sel===questions[idx].a){ rEl.textContent='Richtig!'; rEl.style.color='green' }
          else { rEl.textContent='Das ist falsch.'; rEl.style.color='crimson' }
          setTimeout(()=>{ idx = (idx+1)%questions.length; show() },1000)
        }))
      }
      show()
    </script>
  </body>
</html>
