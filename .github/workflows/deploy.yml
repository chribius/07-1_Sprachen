name: Deploy to GitHub Pages
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          rm -rf docs/html-grundlagen
          mkdir -p docs/html-grundlagen
          cp -r apps/html-grundlagen/* docs/html-grundlagen/
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/html-grundlagen
          git commit -m "Update docs/html-grundlagen" || echo "No changes to commit"
          git push
