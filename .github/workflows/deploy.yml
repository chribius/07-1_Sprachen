name: Deploy to GitHub Pages
on:
  push:
    branches: [main]
    paths:
      - 'apps/html-grundlagen/**'
      - 'apps/html-quiz/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Sync apps to docs
        run: |
          set -e
          rm -rf docs/html-grundlagen
          mkdir -p docs/html-grundlagen
          cp -r apps/html-grundlagen/* docs/html-grundlagen/

          rm -rf docs/html-quiz
          mkdir -p docs/html-quiz
          cp -r apps/html-quiz/* docs/html-quiz/

      - name: Commit and push docs
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/html-grundlagen docs/html-quiz
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Deploy html-grundlagen + html-quiz"
          git push
