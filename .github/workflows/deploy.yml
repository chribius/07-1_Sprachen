name: Build and publish docs

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Prepare docs folder
        run: |
          rm -rf docs || true
          mkdir -p docs
          # Copy each app into docs so GitHub Pages (main:/docs) can serve them
          cp -R apps/* docs/

      - name: Commit docs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs
          git commit -m "chore: update docs from apps [skip ci]" || echo "no changes to commit"
          git push
